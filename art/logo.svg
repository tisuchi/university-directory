<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#shine)"/>

  <!-- Graduation cap -->
  <g transform="translate(256, 175)">
    <!-- Cap board (flat top) -->
    <polygon points="0,-52 140,0 0,30 -140,0" fill="#FFFFFF"/>
    <!-- Cap underside shadow -->
    <polygon points="0,30 140,0 0,14 -140,0" fill="#E0E0FF" opacity="0.5"/>
    <!-- Center button -->
    <circle cx="0" cy="-52" r="8" fill="#E0E7FF"/>
    <!-- Tassel cord -->
    <path d="M0,-52 Q-30,-52 -60,-44 Q-68,-42 -70,-30 L-70,12" fill="none" stroke="#E0E7FF" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Tassel -->
    <path d="M-76,12 L-64,12 L-66,36 Q-70,42 -74,36 Z" fill="#E0E7FF"/>
  </g>

  <!-- Pillars (classical university columns) -->
  <g fill="#FFFFFF">
    <!-- Left pillar -->
    <rect x="138" y="238" width="18" height="100" rx="2"/>
    <rect x="132" y="232" width="30" height="10" rx="2"/>
    <rect x="132" y="336" width="30" height="10" rx="2"/>

    <!-- Center-left pillar -->
    <rect x="202" y="238" width="18" height="100" rx="2"/>
    <rect x="196" y="232" width="30" height="10" rx="2"/>
    <rect x="196" y="336" width="30" height="10" rx="2"/>

    <!-- Center-right pillar -->
    <rect x="292" y="238" width="18" height="100" rx="2"/>
    <rect x="286" y="232" width="30" height="10" rx="2"/>
    <rect x="286" y="336" width="30" height="10" rx="2"/>

    <!-- Right pillar -->
    <rect x="356" y="238" width="18" height="100" rx="2"/>
    <rect x="350" y="232" width="30" height="10" rx="2"/>
    <rect x="350" y="336" width="30" height="10" rx="2"/>
  </g>

  <!-- Base / foundation -->
  <rect x="116" y="350" width="280" height="14" rx="4" fill="#FFFFFF"/>

  <!-- Pediment / triangular roof -->
  <polygon points="256,200 390,240 122,240" fill="#FFFFFF"/>

  <!-- Search / directory magnifying glass accent -->
  <g transform="translate(370, 370)">
    <circle cx="0" cy="0" r="32" stroke="#FFFFFF" stroke-width="7" fill="none" opacity="0.9"/>
    <line x1="22" y1="22" x2="48" y2="48" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Three horizontal lines inside the building (directory listing) -->
  <g stroke="#E0E7FF" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="180" y1="268" x2="332" y2="268"/>
    <line x1="180" y1="288" x2="332" y2="288"/>
    <line x1="180" y1="308" x2="332" y2="308"/>
  </g>
</svg>
