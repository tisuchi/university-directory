<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Very light background (Tailwind slate-50) -->
  <rect width="512" height="512" rx="80" fill="#F8FAFC"/>

  <!-- Soft border (Tailwind indigo-200) -->
  <rect x="3" y="3" width="506" height="506" rx="77" fill="none" stroke="#C7D2FE" stroke-width="3"/>

  <!-- University building - centered -->
  <g transform="translate(256, 256)">

    <!-- Dome -->
    <path d="M-40,-80 Q-40,-130 0,-140 Q40,-130 40,-80" fill="url(#accent)" opacity="0.9"/>
    <!-- Dome base bar -->
    <rect x="-48" y="-82" width="96" height="8" rx="3" fill="#6366F1"/>

    <!-- Small flag/spire on top -->
    <line x1="0" y1="-140" x2="0" y2="-162" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    <polygon points="0,-162 14,-155 0,-148" fill="#818CF8"/>

    <!-- Triangular pediment -->
    <polygon points="0,-68 -110,-28 110,-28" fill="#6366F1" opacity="0.15"/>
    <polygon points="0,-68 -110,-28 110,-28" fill="none" stroke="#6366F1" stroke-width="2.5" opacity="0.7"/>

    <!-- Pediment base bar -->
    <rect x="-116" y="-30" width="232" height="8" rx="3" fill="#6366F1" opacity="0.8"/>

    <!-- Columns -->
    <g fill="#6366F1" opacity="0.7">
      <!-- Column 1 -->
      <rect x="-96" y="-20" width="14" height="90" rx="3"/>
      <!-- Column 2 -->
      <rect x="-48" y="-20" width="14" height="90" rx="3"/>
      <!-- Column 3 -->
      <rect x="34" y="-20" width="14" height="90" rx="3"/>
      <!-- Column 4 -->
      <rect x="82" y="-20" width="14" height="90" rx="3"/>
    </g>

    <!-- Column capitals (top) -->
    <g fill="#818CF8" opacity="0.6">
      <rect x="-100" y="-24" width="22" height="6" rx="2"/>
      <rect x="-52" y="-24" width="22" height="6" rx="2"/>
      <rect x="30" y="-24" width="22" height="6" rx="2"/>
      <rect x="78" y="-24" width="22" height="6" rx="2"/>
    </g>

    <!-- Column bases (bottom) -->
    <g fill="#818CF8" opacity="0.6">
      <rect x="-100" y="68" width="22" height="6" rx="2"/>
      <rect x="-52" y="68" width="22" height="6" rx="2"/>
      <rect x="30" y="68" width="22" height="6" rx="2"/>
      <rect x="78" y="68" width="22" height="6" rx="2"/>
    </g>

    <!-- Center entrance / door -->
    <rect x="-16" y="24" width="32" height="50" rx="16" fill="#6366F1" opacity="0.2"/>
    <rect x="-16" y="24" width="32" height="50" rx="16" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.5"/>

    <!-- Steps / foundation -->
    <rect x="-126" y="76" width="252" height="10" rx="3" fill="#6366F1" opacity="0.75"/>
    <rect x="-136" y="88" width="272" height="8" rx="3" fill="#6366F1" opacity="0.5"/>
    <rect x="-146" y="98" width="292" height="6" rx="3" fill="#6366F1" opacity="0.3"/>

  </g>
</svg>
