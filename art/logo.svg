<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Light sky-to-indigo gradient (Tailwind sky-100 → indigo-100) -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <!-- Accent gradient (Tailwind sky-500 → indigo-500) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Cap gradient (Tailwind indigo-400 → indigo-500) -->
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="#C7D2FE" stroke-width="2" opacity="0.6"/>

  <!-- Graduation cap -->
  <g transform="translate(256, 168)">
    <!-- Cap board -->
    <polygon points="0,-48 134,0 0,28 -134,0" fill="url(#cap)"/>
    <!-- Cap underside -->
    <polygon points="0,28 134,0 0,12 -134,0" fill="#4F46E5" opacity="0.25"/>
    <!-- Center button -->
    <circle cx="0" cy="-48" r="7" fill="#4338CA"/>
    <!-- Tassel cord -->
    <path d="M0,-48 Q-28,-48 -55,-40 Q-64,-38 -66,-26 L-66,14" fill="none" stroke="#4338CA" stroke-width="3" stroke-linecap="round"/>
    <!-- Tassel -->
    <path d="M-72,14 L-60,14 L-62,36 Q-66,42 -70,36 Z" fill="#4338CA"/>
  </g>

  <!-- Pediment / triangular roof -->
  <polygon points="256,198 386,236 126,236" fill="#6366F1" opacity="0.85"/>

  <!-- Pillars -->
  <g fill="#6366F1" opacity="0.75">
    <!-- Left pillar -->
    <rect x="142" y="244" width="16" height="96" rx="2"/>
    <rect x="136" y="238" width="28" height="8" rx="2"/>
    <rect x="136" y="338" width="28" height="8" rx="2"/>

    <!-- Center-left pillar -->
    <rect x="206" y="244" width="16" height="96" rx="2"/>
    <rect x="200" y="238" width="28" height="8" rx="2"/>
    <rect x="200" y="338" width="28" height="8" rx="2"/>

    <!-- Center-right pillar -->
    <rect x="290" y="244" width="16" height="96" rx="2"/>
    <rect x="284" y="238" width="28" height="8" rx="2"/>
    <rect x="284" y="338" width="28" height="8" rx="2"/>

    <!-- Right pillar -->
    <rect x="354" y="244" width="16" height="96" rx="2"/>
    <rect x="348" y="238" width="28" height="8" rx="2"/>
    <rect x="348" y="338" width="28" height="8" rx="2"/>
  </g>

  <!-- Directory lines between pillars -->
  <g stroke="#A5B4FC" stroke-width="3.5" stroke-linecap="round" opacity="0.6">
    <line x1="184" y1="270" x2="328" y2="270"/>
    <line x1="184" y1="290" x2="328" y2="290"/>
    <line x1="184" y1="310" x2="328" y2="310"/>
  </g>

  <!-- Foundation -->
  <rect x="120" y="350" width="272" height="12" rx="4" fill="#6366F1" opacity="0.85"/>

  <!-- Search magnifying glass -->
  <g transform="translate(366, 374)">
    <circle cx="0" cy="0" r="30" stroke="url(#accent)" stroke-width="6" fill="#E0F2FE" fill-opacity="0.7"/>
    <line x1="20" y1="20" x2="44" y2="44" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <!-- Search lines inside glass -->
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-12" y1="4" x2="8" y2="4" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
